title: "Mabior Deng Kuer Mabior"
email: "Mabiordengkuer@yahoo.com"

description: >-
  PhD student in Aviation and Aerospace at Purdue University.
  Research interests include Advanced Air Mobility, airport systems,
  aviation safety, GIS-based decision support, sustainability,
  and transportation systems analysis.

github_username: MabiorAero
minimal_mistakes_skin: air
search: true

markdown: kramdown
